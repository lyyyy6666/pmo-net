dataset: KnowAir
entrypoint: pmonet.experiments.train_wind_knowair
data:
  root_path: ./data/KnowAir
  data_path: KnowAir.npy
  station_path: station.csv
  adj_geo_path: final_adj.npy
  graph_npz_path: graph_data.npz
  feature_metadata_path: knowair_feature_columns.json
model:
  dataset_num: 1
  hist_len: 24
  seq_len: 24
  label_len: 12
  pred_len: 24
  target_idx: auto_from_metadata
  wind_source: u950_v950
  d_model: 256
  latent_dim: 64
  xlstm_num_blocks: 3
  channel_mixer_hidden: 512
  dropout: 0.1
  use_phy_ode: true
  use_unk_ode: true
  use_adaptive_gating: true
  use_wind_advection: true
loss:
  beta: 0.05
  lambda_nonnegative: 0.1
  lambda_temporal_smooth: 0.01
  use_observable_dyn_loss: false
  lambda_observable_dyn: 0.0
training:
  batch_size: 16
  epochs: 100
  lr: 0.0003
  patience: 10
  device: cuda
outputs:
  save_dir: ./outputs/knowair
  checkpoints: ./checkpoints/knowair
