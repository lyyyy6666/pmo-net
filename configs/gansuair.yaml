dataset: GansuAir
entrypoint: pmonet.experiments.train_wind_gansu
data:
  root_path: ./data
  data_path: Gansu_Air.csv
  coords_path: station_coords_physics_first.npy
  adj_geo_path: knn_adj.csv
  poi_path: poi_attribute_adj.npy
  landuse_path: landuse_attribute_adj.npy
  meteo_path: meteo_physics_first.npy
  meteo_columns_path: meteo_physics_first_columns.json
  meteo_station_order_path: meteo_physics_first_station_order.json
  meteo_datetime_path: meteo_physics_first_datetime.csv
model:
  seq_len: 24
  label_len: 12
  pred_len: 24
  features: MS
  target_idx: 0
  d_model: 256
  latent_dim: 64
  xlstm_num_blocks: 3
  channel_mixer_hidden: 512
  dropout: 0.1
  use_phy_ode: true
  use_unk_ode: true
  use_adaptive_gating: true
  use_wind_advection: true
loss:
  beta: 0.05
  lambda_nonnegative: 0.1
  lambda_temporal_smooth: 0.01
  use_observable_dyn_loss: false
  lambda_observable_dyn: 0.0
training:
  batch_size: 16
  epochs: 100
  lr: 0.0003
  patience: 10
  device: cuda
outputs:
  save_dir: ./outputs/gansuair
  checkpoints: ./checkpoints/gansuair
